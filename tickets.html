<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maj Fest 2026 – Tickets</title>
  <style>
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-image:
        linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 10px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
      text-transform: uppercase;
    }

    p.subtitle {
      font-size: 1.5em;
      margin-bottom: 40px;
    }

    h2 {
      color: #ffdc64;
      text-transform: uppercase;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .section-box {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
      margin-bottom: 40px;
    }

    iframe {
      border-radius: 10px;
      width: 100%;
      max-width: 640px;
      border: none;
    }

    input, button {
      font-family: inherit;
      border: none;
      border-radius: 6px;
      padding: 10px 15px;
      font-size: 1rem;
    }

    input {
      width: 250px;
    }

    button {
      background: #ffcc00;
      color: #000;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #fff44f;
    }

    #ticketCanvas {
      display: none;
      margin-top: 20px;
      border-radius: 10px;
    }

    #downloadLink {
      display: none;
      background: #ffdc64;
      color: #000;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      margin-top: 20px;
    }

    a.back-link {
      display: inline-block;
      margin-top: 50px;
      color: #ffdc64;
      text-decoration: none;
      font-weight: bold;
    }

    a.back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Maj Fest 2026</h1>
    <p class="subtitle">Allan’s 50th Birthday Festival Experience</p>

    <!-- RSVP FORM -->
    <div class="section-box">
      <h2>RSVP Here</h2>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe4-Jb5RtISHjHlekmAhadNlCgd-d2cqB5M998HylmNZo7W4A/viewform?embedded=true" width="640" height="1221" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </div>

    <!-- TICKET GENERATOR -->
    <div class="section-box">
      <h2>🎟 Generate Your Ticket</h2>
      <p>After RSVPing, type your name below to create your personalised festival pass!</p>
      <input id="guestName" placeholder="Your Name" />
      <button onclick="makeTicket()">Create Ticket</button><br />

      <canvas id="ticketCanvas" width="600" height="300"></canvas><br />
      <a id="downloadLink" download="MajFestTicket.png">Download My Ticket 🎟</a>
    </div>

    <a href="index.html" class="back-link">← Back to Countdown</a>
  </div>

  <script>
    function makeTicket() {
      const name = document.getElementById("guestName").value.trim();
      if (!name) return alert("Please enter your name!");
      const c = document.getElementById("ticketCanvas");
      const ctx = c.getContext("2d");
      c.style.display = "block";

      // background gradient
      const gradient = ctx.createLinearGradient(0, 0, 600, 300);
      gradient.addColorStop(0, "#6A5ACD");
      gradient.addColorStop(1, "#8A2BE2");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 600, 300);

      // border
      ctx.strokeStyle = "#FFD700";
      ctx.lineWidth = 6;
      ctx.strokeRect(10, 10, 580, 280);

      // text
      ctx.fillStyle = "white";
      ctx.font = "bold 28px Arial";
      ctx.fillText("🎪 MAJ FEST 2026 🎪", 130, 100);
      ctx.font = "20px Arial";
      ctx.fillText("Admit One: " + name, 150, 160);
      ctx.fillText("Allan’s 50th Birthday Festival", 100, 200);

      // download link
      const link = document.getElementById("downloadLink");
      link.href = c.toDataURL("image/png");
      link.style.display = "inline-block";
    }
  </script>
</body>
</html>
