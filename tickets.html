<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MajFest 2026 – Get Your Tickets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-light: #FFF176;
      --purple: #6A0DAD;
      --green: #00E676;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      text-align: center;
      min-height: 100vh;
      background-image:
        linear-gradient(135deg, rgba(60,0,100,0.82), rgba(20,20,80,0.75)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* iOS Safari doesn't support background-attachment: fixed on body */
    @supports (-webkit-touch-callout: none) {
      body {
        background-attachment: scroll;
      }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .logo {
      width: 300px;
      max-width: 80%;
      height: auto;
      display: block;
      margin: 0 auto 24px;
      filter: drop-shadow(0 4px 24px rgba(255,215,0,0.4));
      border-radius: 24px;
      mix-blend-mode: lighten;
    }

    /* Section cards */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 32px 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      margin-bottom: 32px;
    }

    .card-title {
      font-family: 'Boogaloo', cursive;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Festoon lights */
    .lights {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 0 0 24px;
      flex-wrap: wrap;
    }

    .bulb {
      width: 12px;
      height: 18px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: inline-block;
      animation: flicker 3s ease-in-out infinite;
    }

    .bulb:nth-child(1) { background:#FF4081; animation-delay:0s;   box-shadow:0 0 8px #FF4081; }
    .bulb:nth-child(2) { background:#FFD700; animation-delay:0.4s; box-shadow:0 0 8px #FFD700; }
    .bulb:nth-child(3) { background:#00E676; animation-delay:0.8s; box-shadow:0 0 8px #00E676; }
    .bulb:nth-child(4) { background:#2979FF; animation-delay:1.2s; box-shadow:0 0 8px #2979FF; }
    .bulb:nth-child(5) { background:#E040FB; animation-delay:1.6s; box-shadow:0 0 8px #E040FB; }
    .bulb:nth-child(6) { background:#FFD700; animation-delay:0.2s; box-shadow:0 0 8px #FFD700; }
    .bulb:nth-child(7) { background:#FF4081; animation-delay:0.6s; box-shadow:0 0 8px #FF4081; }
    .bulb:nth-child(8) { background:#00E676; animation-delay:1.0s; box-shadow:0 0 8px #00E676; }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Google Form iframe */
    .formframe {
      width: 100%;
      height: 75vh;
      min-height: 500px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    /* Ticket generator */
    .input-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .name-input {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 12px 22px;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
      width: 240px;
      transition: border-color 0.2s;
    }

    .name-input::placeholder { color: rgba(255,255,255,0.45); }
    .name-input:focus { border-color: var(--gold); }

    .gen-btn {
      font-family: 'Boogaloo', cursive;
      font-size: 1.1rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--gold), #ffb300);
      color: #1a0040;
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .gen-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(255,215,0,0.6);
    }

    /* Photo upload */
    .photo-upload-label {
      display: inline-block;
      margin-top: 16px;
      background: rgba(255,255,255,0.12);
      border: 2px dashed rgba(255,215,0,0.5);
      border-radius: 16px;
      padding: 16px 28px;
      cursor: pointer;
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .photo-upload-label:hover {
      border-color: var(--gold);
      background: rgba(255,215,0,0.08);
      color: white;
    }

    #photoUpload { display: none; }

    #photoPreview {
      display: none;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      margin: 12px auto 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    /* Canvas ticket */
    #ticketCanvas {
      display: none;
      width: 100%;
      max-width: 620px;
      height: auto;
      margin: 24px auto 0;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .download-btn {
      display: none;
      background: linear-gradient(135deg, var(--green), #00bfa5);
      color: #003020;
      font-family: 'Boogaloo', cursive;
      font-size: 1.1rem;
      letter-spacing: 1px;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,230,118,0.4);
      margin-top: 16px;
      transition: transform 0.2s;
    }

    .download-btn:hover { transform: scale(1.05); }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 12px 0 20px;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="logo.jpg" alt="MajFest 2026 Logo" class="logo" />

    <div class="lights">
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div><div class="bulb"></div>
    </div>

    <!-- RSVP FORM -->
    <div class="card">
      <div class="card-title">📋 RSVP</div>
      <p class="card-sub">Fill in the form below to grab your spot at MajFest 2026</p>
      <hr class="divider">
      <iframe
        class="formframe"
        src="https://docs.google.com/forms/d/e/1FAIpQLSe4-Jb5RtISHjHlekmAhadNlCgd-d2cqB5M998HylmNZo7W4A/viewform?embedded=true">
      </iframe>
    </div>

    <!-- TICKET GENERATOR -->
    <div class="card">
      <div class="card-title">🎟 Your Festival Pass</div>
      <p class="card-sub">After RSVPing above, enter your name to generate your MajFest wristband ticket</p>
      <hr class="divider">

      <div class="input-row">
        <input class="name-input" id="guestName" type="text" placeholder="Enter your name…" maxlength="30" />
      </div>

      <div style="margin-top: 16px;">
        <label class="photo-upload-label" for="photoUpload">
          📷 Upload Your Photo
        </label>
        <input type="file" id="photoUpload" accept="image/*" onchange="previewPhoto(event)" />
        <br>
        <img id="photoPreview" src="" alt="Your photo preview" />
      </div>

      <div style="margin-top: 20px;">
        <button class="gen-btn" onclick="makeTicket()">Generate My Festival Pass ✨</button>
      </div>

      <canvas id="ticketCanvas" width="620" height="340"></canvas>
      <br>
      <a class="download-btn" id="downloadLink" download="MajFest2026_Pass.png">⬇ Download My Festival Pass</a>
    </div>

    <a href="index.html" class="back-link">← Back to Countdown</a>

  </div>

  <script>
    let uploadedPhoto = null;

    function previewPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById("photoPreview");
        preview.src = e.target.result;
        preview.style.display = "block";
        const img = new Image();
        img.onload = () => { uploadedPhoto = img; };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function makeTicket() {
      const name = document.getElementById("guestName").value.trim();
      if (!name) { alert("Please enter your name first!"); return; }

      const canvas = document.getElementById("ticketCanvas");
      const ctx = canvas.getContext("2d");
      const W = 620, H = 340;
      canvas.width = W; canvas.height = H;

      // --- BACKGROUND: earthy Glastonbury feel ---
      // Deep olive/brown base
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0,   "#1a1200");
      bg.addColorStop(0.4, "#2e1f00");
      bg.addColorStop(1,   "#0f1a0a");
      ctx.fillStyle = bg;
      ctx.roundRect(0, 0, W, H, 18);
      ctx.fill();

      // Subtle mud-field texture stripes
      for (let i = 0; i < H; i += 4) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.012})`;
        ctx.fillRect(0, i, W, 1);
      }

      // Top colour band — festival wristband rainbow stripe
      const bandH = 10;
      const bandColors = ["#c0392b","#e67e22","#f1c40f","#27ae60","#2980b9","#8e44ad"];
      const bw = W / bandColors.length;
      bandColors.forEach((c, i) => {
        ctx.fillStyle = c;
        ctx.fillRect(i * bw, 0, bw + 1, bandH);
      });

      // Outer border — aged cream/gold
      ctx.strokeStyle = "#c8a84b";
      ctx.lineWidth = 3;
      ctx.roundRect(4, 4, W - 8, H - 8, 16);
      ctx.stroke();

      // Inner border — thin rust
      ctx.strokeStyle = "rgba(180,100,20,0.4)";
      ctx.lineWidth = 1;
      ctx.roundRect(12, 14, W - 24, H - 22, 12);
      ctx.stroke();

      // Dashed tear line (vertical, right stub)
      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = "rgba(200,168,75,0.35)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(W - 130, 18);
      ctx.lineTo(W - 130, H - 14);
      ctx.stroke();
      ctx.setLineDash([]);

      // ✂ scissor icon on tear line
      ctx.fillStyle = "rgba(200,168,75,0.5)";
      ctx.font = "14px Arial";
      ctx.textAlign = "center";
      ctx.fillText("✂", W - 130, 32);

      // --- PYRAMID ICON (Glastonbury signature) ---
      const px = 44, py = 28, pw = 50;
      ctx.beginPath();
      ctx.moveTo(px + pw / 2, py);
      ctx.lineTo(px + pw, py + 36);
      ctx.lineTo(px, py + 36);
      ctx.closePath();
      const pyGrad = ctx.createLinearGradient(px, py, px + pw, py + 36);
      pyGrad.addColorStop(0, "#f1c40f");
      pyGrad.addColorStop(1, "#c0392b");
      ctx.fillStyle = pyGrad;
      ctx.fill();

      // Stars around pyramid
      ["★","★","★"].forEach((s, i) => {
        ctx.fillStyle = "#f1c40f";
        ctx.font = "10px Arial";
        ctx.textAlign = "left";
        ctx.fillText(s, px - 14 + i * 38, py + 10 + (i % 2) * 8);
      });

      // --- FESTIVAL NAME ---
      ctx.textAlign = "left";
      ctx.fillStyle = "#f1c40f";
      ctx.font = "bold 32px 'Arial Black', Georgia, serif";
      ctx.shadowColor = "rgba(241,196,15,0.4)";
      ctx.shadowBlur = 10;
      ctx.fillText("MAJ FEST 2026", 106, 62);
      ctx.shadowBlur = 0;

      // Tagline
      ctx.fillStyle = "rgba(220,200,150,0.65)";
      ctx.font = "italic 13px Georgia, serif";
      ctx.fillText("Allan's 50th Birthday Festival", 108, 82);

      // Divider rule
      ctx.strokeStyle = "rgba(200,168,75,0.3)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(26, 96);
      ctx.lineTo(W - 140, 96);
      ctx.stroke();

      // --- DATE & VENUE ---
      ctx.fillStyle = "rgba(220,200,150,0.5)";
      ctx.font = "11px Arial";
      ctx.fillText("DATE", 26, 114);
      ctx.fillStyle = "#e8d5a0";
      ctx.font = "bold 14px Georgia, serif";
      ctx.fillText("Saturday 27th June 2026", 26, 132);

      ctx.fillStyle = "rgba(220,200,150,0.5)";
      ctx.font = "11px Arial";
      ctx.fillText("VENUE", 26, 154);
      ctx.fillStyle = "#e8d5a0";
      ctx.font = "bold 14px Georgia, serif";
      ctx.fillText("22 Cleveland Avenue, Hampton", 26, 172);

      // Second divider
      ctx.strokeStyle = "rgba(200,168,75,0.3)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(26, 184);
      ctx.lineTo(W - 140, 184);
      ctx.stroke();

      // --- TICKET HOLDER NAME ---
      ctx.fillStyle = "rgba(220,200,150,0.5)";
      ctx.font = "11px Arial";
      ctx.fillText("TICKET HOLDER", 26, 202);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 26px 'Arial Black', Georgia, serif";
      ctx.shadowColor = "rgba(255,255,255,0.2)";
      ctx.shadowBlur = 6;
      ctx.fillText(name.toUpperCase(), 26, 230);
      ctx.shadowBlur = 0;

      // GENERAL ADMISSION badge
      const badgeX = 26, badgeY = 244;
      ctx.fillStyle = "#27ae60";
      ctx.roundRect(badgeX, badgeY, 160, 24, 12);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 11px Arial";
      ctx.textAlign = "center";
      ctx.fillText("✔  GENERAL ADMISSION", badgeX + 80, badgeY + 16);
      ctx.textAlign = "left";

      // --- PHOTO (bottom right, just left of tear line) ---
      const photoSize = 70;
      const photoX = W - 130 - photoSize - 12;
      const photoY = H - photoSize - 18;

      if (uploadedPhoto) {
        // Circular clip
        ctx.save();
        ctx.beginPath();
        ctx.arc(photoX + photoSize / 2, photoY + photoSize / 2, photoSize / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(uploadedPhoto, photoX, photoY, photoSize, photoSize);
        ctx.restore();
        // Circle border
        ctx.strokeStyle = "#c8a84b";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(photoX + photoSize / 2, photoY + photoSize / 2, photoSize / 2, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // Placeholder circle
        ctx.strokeStyle = "rgba(200,168,75,0.4)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(photoX + photoSize / 2, photoY + photoSize / 2, photoSize / 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "rgba(200,168,75,0.15)";
        ctx.fill();
        ctx.fillStyle = "rgba(220,200,150,0.4)";
        ctx.font = "22px Arial";
        ctx.textAlign = "center";
        ctx.fillText("👤", photoX + photoSize / 2, photoY + photoSize / 2 + 8);
        ctx.textAlign = "left";
      }

      // --- STUB (right side) ---
      ctx.textAlign = "center";
      const stubX = W - 65;

      // Stub heading
      ctx.fillStyle = "#f1c40f";
      ctx.font = "bold 11px Arial";
      ctx.fillText("ADMIT", stubX, 55);
      ctx.font = "bold 30px 'Arial Black', Arial";
      ctx.fillText("ONE", stubX, 88);

      // Mini pyramid in stub
      const spx = stubX - 18, spy = 100, spw = 36;
      ctx.beginPath();
      ctx.moveTo(spx + spw / 2, spy);
      ctx.lineTo(spx + spw, spy + 26);
      ctx.lineTo(spx, spy + 26);
      ctx.closePath();
      ctx.fillStyle = "rgba(241,196,15,0.6)";
      ctx.fill();

      // Stub divider
      ctx.strokeStyle = "rgba(200,168,75,0.3)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W - 120, 138);
      ctx.lineTo(W - 14, 138);
      ctx.stroke();

      // Date in stub
      ctx.fillStyle = "rgba(220,200,150,0.55)";
      ctx.font = "10px Arial";
      ctx.fillText("27 JUNE", stubX, 155);
      ctx.fillText("2026", stubX, 170);

      // Barcode
      const bcY = H - 80, bcX = W - 118;
      const bars = [3,1,2,1,4,1,2,1,3,1,2,1,3,1,2,1,1];
      let bOff = bcX;
      bars.forEach((bw2, i) => {
        ctx.fillStyle = i % 2 === 0
          ? "rgba(220,200,150,0.85)"
          : "transparent";
        if (i % 2 === 0) ctx.fillRect(bOff, bcY, bw2 * 2.5, 38);
        bOff += bw2 * 2.5 + 1;
      });
      ctx.fillStyle = "rgba(220,200,150,0.35)";
      ctx.font = "8px Arial";
      ctx.fillText("MAJFEST-2026", stubX, bcY + 50);

      // KEEP THIS STUB text
      ctx.fillStyle = "rgba(220,200,150,0.35)";
      ctx.font = "9px Arial";
      ctx.fillText("KEEP THIS STUB", stubX, H - 20);

      ctx.textAlign = "left";

      // Show canvas & download
      canvas.style.display = "block";
      const link = document.getElementById("downloadLink");
      link.href = canvas.toDataURL("image/png");
      link.style.display = "inline-block";
    }
  </script>
</body>
</html>
