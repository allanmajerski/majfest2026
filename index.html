<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maj Fest 2026 - Allan's 50th Birthday Festival Experience</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.2rem;
      color: #bbb;
      margin-bottom: 40px;
    }

    #countdown {
      font-size: 2rem;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .time {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time span {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffcc00;
    }

    #ticket {
      margin-top: 40px;
    }

    .btn {
      background: #ffcc00;
      color: #111;
      padding: 15px 25px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Maj Fest 2026</h1>
  <h2>Allan's 50th Birthday Festival Experience</h2>

  <div id="countdown">
    <div class="time"><span id="days">00</span>Days</div>
    <div class="time"><span id="hours">00</span>Hours</div>
    <div class="time"><span id="minutes">00</span>Minutes</div>
    <div class="time"><span id="seconds">00</span>Seconds</div>
  </div>

  <div id="ticket" class="hidden">
    <a href="tickets.html" class="btn">🎟 Get Your Tickets</a>
  </div>

  <script>
    // Set countdown to 25 April 2026, 9:00 AM UK time
    const countDownDate = new Date(Date.UTC(2026, 3, 25, 8, 0, 0)).getTime();
    // (UK is UTC+1 in April, so 8 AM UTC = 9 AM UK time)

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = countDownDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = days.toString().padStart(2, '0');
      document.getElementById("hours").textContent = hours.toString().padStart(2, '0');
      document.getElementById("minutes").textContent = minutes.toString().padStart(2, '0');
      document.getElementById("seconds").textContent = seconds.toString().padStart(2, '0');

      if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "<h2>🎉 Tickets Are Now Live!</h2>";
        document.getElementById("ticket").classList.remove("hidden");
      }
    }, 1000);
  </script>
</body>
</html>
