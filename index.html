<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maj Fest 2026 – Countdown</title>

  <style>
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-image:
        linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* LOGO */
    .logo {
      width: 450px;
      max-width: 90%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    .container {
      max-width: 800px;
      width: 90%;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 4em);
      margin-bottom: 10px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
      text-transform: uppercase;
    }

    .festival-date {
      font-size: clamp(1rem, 4vw, 1.5em);
      font-weight: bold;
      color: #ffdc64;
      margin-bottom: 40px;
    }

    .countdown-box {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px 20px;
      backdrop-filter: blur(10px);
      margin-bottom: 40px;
    }

    h2 {
      font-size: clamp(1.2rem, 4vw, 2rem);
      text-transform: uppercase;
      color: #ffdc64;
      margin-bottom: 20px;
    }

    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .time-unit {
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      padding: 15px;
      flex: 1 1 20%;
      min-width: 70px;
    }

    .number {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: bold;
      display: block;
    }

    .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .ticket-button {
      background: #ffdc64;
      color: #000;
      font-weight: bold;
      padding: 15px 30px;
      border-radius: 40px;
      text-decoration: none;
      display: inline-block;
      margin-top: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .ticket-button:hover {
      background: #fff44f;
      transform: scale(1.05);
    }

    /* Spotify */
    .spotify-player {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      z-index: 999;
    }

    /* MOBILE TWEAKS */
    @media (max-width: 500px) {
      .countdown-box { padding: 25px 10px; }
      .time-unit { flex: 1 1 40%; margin-bottom: 15px; }
      .spotify-player iframe { height: 100px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGO (proper placement) -->
    <img src="logo.jpg" alt="Maj Fest 2026 Logo" class="logo">

    <h1>MAJ FEST 2026</h1>
    <p class="festival-date">27 June 2026</p>

    <div class="countdown-box">
      <h2>Tickets On Sale In</h2>

      <div class="countdown-wrapper" id="timer-display">
        <div class="time-unit">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>

      <!-- Hidden button until countdown finishes -->
      <div id="ticket-button-box" style="display:none;">
        <a href="tickets.html" class="ticket-button">🎟 Get Your Tickets 🎟</a>
      </div>
    </div>
  </div>

  <!-- Spotify Player -->
  <div class="spotify-player">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/track/6vZZtivPrtpggT5SSXsYTy?utm_source=generator"
      width="100%" height="152" frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <script>
    // Countdown to 25 April 2026 at 09:00
    const targetDate = new Date("2026-04-25T09:00:00").getTime();

    function updateTimer() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById("timer-display").innerHTML = "<h3>🎉 Tickets Are Now Live!</h3>";
        document.getElementById("ticket-button-box").style.display = "block";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>

</body>
</html>
