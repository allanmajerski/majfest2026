<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maj Fest 2026 - Tickets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>MAJ FEST 2026</h1>
    <p class="subtitle">Allan's 50th Birthday Festival Experience</p>

    <div class="countdown-box">
      <h2>TICKETS ON SALE</h2>

      <div class="countdown-wrapper" id="timer-display">
        <div class="time-unit">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Countdown to 25 April 2026 at 09:00 local time
    const targetDate = new Date("2026-04-25T09:00:00").getTime();

    function updateTimer() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById("timer-display").innerHTML =
          '<h3>🎉 TICKETS ARE NOW AVAILABLE!</h3>' +
          '<a href="tickets.html" style="display:inline-block;margin-top:20px;background:#ffdc64;color:#000;padding:15px 25px;border-radius:40px;font-weight:bold;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.3);">GET YOUR TICKETS</a>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
