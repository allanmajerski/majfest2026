<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MajFest 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-light: #FFF176;
      --purple: #6A0DAD;
      --purple-dark: #3a0070;
      --green: #00E676;
      --pink: #FF4081;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      text-align: center;
      min-height: 100vh;
      background-image:
        linear-gradient(135deg, rgba(60,0,100,0.82), rgba(20,20,80,0.75)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* iOS Safari doesn't support background-attachment: fixed on body */
    @supports (-webkit-touch-callout: none) {
      body {
        background-attachment: scroll;
      }
    }

    /* Animated noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 30px 20px 140px;
    }

    /* Logo */
    .logo {
      width: 340px;
      max-width: 85%;
      height: auto;
      display: block;
      margin: 0 auto 30px;
      filter: drop-shadow(0 4px 24px rgba(255,215,0,0.4));
      animation: float 4s ease-in-out infinite;
      border-radius: 24px;
      mix-blend-mode: lighten;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Date badge */
    .festival-date {
      display: inline-block;
      background: var(--gold);
      color: #1a0040;
      font-family: 'Boogaloo', cursive;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 6px 24px;
      border-radius: 50px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    /* Countdown card */
    .countdown-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 36px 28px 40px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .countdown-label {
      font-family: 'Boogaloo', cursive;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .time-unit {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 20px 16px;
      min-width: 90px;
      position: relative;
      overflow: hidden;
    }

    .time-unit::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    .number {
      font-family: 'Boogaloo', cursive;
      font-size: 3.2rem;
      color: var(--gold);
      display: block;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255,215,0,0.6);
    }

    .unit-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      display: block;
      margin-top: 6px;
    }

    /* Live message */
    .live-message {
      font-family: 'Boogaloo', cursive;
      font-size: 2rem;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0,230,118,0.5);
      padding: 10px 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Ticket button */
    .ticket-btn {
      display: inline-block;
      margin-top: 32px;
      background: linear-gradient(135deg, var(--gold), #ffb300);
      color: #1a0040;
      font-family: 'Boogaloo', cursive;
      font-size: 1.4rem;
      letter-spacing: 1px;
      padding: 16px 40px;
      border-radius: 60px;
      text-decoration: none;
      box-shadow: 0 6px 30px rgba(255,215,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 6px 30px rgba(255,215,0,0.5), 0 2px 8px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 6px 50px rgba(255,215,0,0.8), 0 2px 8px rgba(0,0,0,0.4); }
    }

    .ticket-btn:hover {
      transform: scale(1.06) translateY(-2px);
    }

    /* Festoon string lights decoration */
    .lights {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 28px 0 20px;
      flex-wrap: wrap;
    }

    .bulb {
      width: 14px;
      height: 20px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: inline-block;
      animation: flicker 3s ease-in-out infinite;
    }

    .bulb:nth-child(1) { background: #FF4081; animation-delay: 0s; box-shadow: 0 0 10px #FF4081; }
    .bulb:nth-child(2) { background: #FFD700; animation-delay: 0.4s; box-shadow: 0 0 10px #FFD700; }
    .bulb:nth-child(3) { background: #00E676; animation-delay: 0.8s; box-shadow: 0 0 10px #00E676; }
    .bulb:nth-child(4) { background: #2979FF; animation-delay: 1.2s; box-shadow: 0 0 10px #2979FF; }
    .bulb:nth-child(5) { background: #FF4081; animation-delay: 1.6s; box-shadow: 0 0 10px #FF4081; }
    .bulb:nth-child(6) { background: #FFD700; animation-delay: 0.2s; box-shadow: 0 0 10px #FFD700; }
    .bulb:nth-child(7) { background: #00E676; animation-delay: 0.6s; box-shadow: 0 0 10px #00E676; }
    .bulb:nth-child(8) { background: #E040FB; animation-delay: 1.0s; box-shadow: 0 0 10px #E040FB; }
    .bulb:nth-child(9) { background: #FF4081; animation-delay: 1.4s; box-shadow: 0 0 10px #FF4081; }
    .bulb:nth-child(10) { background: #FFD700; animation-delay: 1.8s; box-shadow: 0 0 10px #FFD700; }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Spotify */
    .spotify-player {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      z-index: 999;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    /* Wristband strip */
    .wristband {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 24px 0 0;
      font-family: 'Boogaloo', cursive;
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    .wristband span { color: var(--gold); }
  </style>
</head>

<body>
  <div class="container">

    <img src="logo.jpg" alt="MajFest 2026 Logo" class="logo" />

    <div class="festival-date">📅 27th June 2026</div>

    <div class="lights">
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
      <div class="bulb"></div>
    </div>

    <div class="countdown-card">
      <div class="countdown-label">🎟 Tickets On Sale In</div>

      <div class="countdown-wrapper" id="timer-display">
        <div class="time-unit">
          <span class="number" id="days">00</span>
          <span class="unit-label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number" id="hours">00</span>
          <span class="unit-label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number" id="minutes">00</span>
          <span class="unit-label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number" id="seconds">00</span>
          <span class="unit-label">Seconds</span>
        </div>
      </div>

      <div id="ticket-button-box" style="display:none;">
        <div class="live-message">🎉 Tickets Are Now Live!</div>
        <a href="tickets.html" class="ticket-btn">🎟 Get Your Tickets 🎟</a>
      </div>
    </div>

    <div class="wristband">Allan's <span>50th</span> Birthday Festival</div>

  </div>

  <div class="spotify-player">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/track/6vZZtivPrtpggT5SSXsYTy?utm_source=generator"
      width="100%" height="152" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <script>
    // Tickets go live: Friday 24th April 2026 at 09:00 local time
    const targetDate = new Date("2026-04-24T09:00:00").getTime();

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateTimer() {
      const now = Date.now();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("timer-display").style.display = "none";
        document.getElementById("ticket-button-box").style.display = "block";
        return;
      }

      document.getElementById("days").textContent    = pad(Math.floor(distance / 86400000));
      document.getElementById("hours").textContent   = pad(Math.floor((distance % 86400000) / 3600000));
      document.getElementById("minutes").textContent = pad(Math.floor((distance % 3600000) / 60000));
      document.getElementById("seconds").textContent = pad(Math.floor((distance % 60000) / 1000));
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
