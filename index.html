<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <img src="logo.jpg" alt="Maj Fest 2026 Logo" class="logo" />
  <style>
    body {
      font-family: 'Arial Black', Arial, sans-serif;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background-image:
        linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 10px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
      text-transform: uppercase;
    }

    p.subtitle {
      font-size: 1.5em;
      margin-bottom: 40px;
    }

    .festival-date {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 40px;
      color: #ffdc64;
    }

    .countdown-box {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .time-unit {
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      padding: 20px;
      min-width: 90px;
    }

    .number {
      font-size: 3em;
      font-weight: bold;
      display: block;
    }

    .label {
      font-size: 1em;
      text-transform: uppercase;
      margin-top: 5px;
      display: block;
    }

    /* Ticket button */
    .ticket-button {
      background: #ffdc64;
      color: #000;
      font-weight: bold;
      padding: 15px 30px;
      border-radius: 40px;
      text-decoration: none;
      display: inline-block;
      margin-top: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .ticket-button:hover {
      transform: scale(1.05);
      background: #fff44f;
    }

    /* Spotify bar */
    .spotify-player {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      z-index: 999;
    }

    img.logo {
      width: 500px;      /* adjust to taste */
      max-width: 90%;    /* stays responsive on small screens */
      height: auto;
      display: block;
      margin: 0 auto 30px;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1 class="festival-date">27th June 2026</h1>

    <div class="countdown-box">
      <h2>TICKETS ON SALE</h2>

      <div class="countdown-wrapper" id="timer-display">
        <div class="time-unit">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>

      <!-- Hidden ticket button that appears when the countdown ends -->
      <div id="ticket-button-box" style="display:none;">
        <a href="tickets.html" class="ticket-button">🎟 Get Your Tickets 🎟</a>
      </div>
    </div>
  </div>

  <!-- Spotify Player -->
  <div class="spotify-player">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/track/6vZZtivPrtpggT5SSXsYTy?utm_source=generator"
      width="100%" height="152" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <script>
    // Countdown to 25 April 2026 at 09:00 local time
    const targetDate = new Date("2026-04-25T09:00:00").getTime();

    function updateTimer() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById("timer-display").innerHTML = "<h3>🎉 Tickets Are Now Live!</h3>";
        document.getElementById("ticket-button-box").style.display = "block";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
